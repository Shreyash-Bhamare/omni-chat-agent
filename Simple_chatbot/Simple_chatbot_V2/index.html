<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First AI Chatbot</title>
    <link rel="stylesheet" href="chatbot_style.css">
</head>
<body>

    <div class="chat-container">
        <h2>My First AI Chatbot</h2>
        
        <div id="chat-window" class="chat-window">
            <div class="message system-msg">Chatbot initialized. Type a message below!</div>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Ask your chatbot something..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="chatbot_js.js"></script>
</body>
</html>
